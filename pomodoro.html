<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - CalculEtudiant</title>
    <meta name="description" content="Timer Pomodoro avec ambiance zen, statistiques de productivité et suggestions IA.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calculateurs.css">
    <script src="themes.js"></script>
    <script src="xp-system.js"></script>
    <meta name="monetag" content="f3e946f9f7f1823f3dd3fa3e4840ad80">
    <style>
        .pomodoro-container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
        .mode-selector { display: flex; gap: 0.8rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .mode-btn {
            background: var(--card); border: 2px solid var(--border); padding: 0.6rem 1.2rem;
            border-radius: 50px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
            transition: all var(--transition); color: var(--text-light);
        }
        .mode-btn:hover { border-color: var(--primary); }
        .mode-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
        .task-input-wrapper {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1rem 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow);
        }
        .task-input { width: 100%; border: none; font-size: 1rem; font-family: 'DM Sans', sans-serif; background: transparent; outline: none; color: var(--text); }
        .task-input::placeholder { color: var(--text-light); }
        .timer-wrapper { display: flex; justify-content: center; margin-bottom: 2rem; }
        .timer-circle { position: relative; width: 280px; height: 280px; }
        .timer-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .timer-bg-circle { fill: none; stroke: var(--border); stroke-width: 8; }
        .timer-progress-circle { fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .timer-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .timer-display { font-family: 'Syne', sans-serif; font-size: 3.5rem; font-weight: 800; color: var(--text); letter-spacing: -2px; line-height: 1; }
        .timer-label { font-size: 0.8rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.5rem; }
        .session-counter { font-size: 0.8rem; color: var(--text-light); margin-top: 0.5rem; }
        .controls { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn-control {
            background: var(--card); border: 1px solid var(--border); padding: 0.7rem 1.5rem;
            border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: all var(--transition); color: var(--text);
        }
        .btn-control:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .btn-start { background: var(--primary); color: #FFF; border: none; box-shadow: 0 4px 12px rgba(var(--primaryRGB),0.3); }
        .btn-start.paused { background: #F59E0B; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; text-align: center; transition: all var(--transition); }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .stat-value { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--text); }
        .stat-label { font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; margin-top: 0.2rem; }
        .ai-suggestion {
            background: linear-gradient(135deg, #FFF5F0, #FFF0E8);
            border: 1px solid rgba(var(--primaryRGB),0.2);
            border-radius: var(--radius);
            padding: 1.2rem;
            margin-top: 1.5rem;
            display: none;
        }
        .ai-suggestion.show { display: block; animation: fadeInUp 0.5s ease-out; }
        .ai-suggestion h3 { font-family: 'Syne', sans-serif; color: var(--primary); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .ai-suggestion p { color: var(--text-light); line-height: 1.6; font-size: 0.9rem; }

        .xp-bar-container {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 0.5rem 2rem; display: flex; align-items: center; gap: 1rem;
            font-size: 0.8rem; max-width: 1280px; margin: 0 auto; flex-wrap: wrap;
        }
        .xp-label { font-weight: 700; color: var(--primary); white-space: nowrap; }
        .xp-level { font-weight: 700; color: var(--text); white-space: nowrap; }
        .xp-progress { flex: 1; height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; min-width: 100px; }
        .xp-progress-fill { height: 100%; background: linear-gradient(90deg, #FFD23F, var(--primary)); border-radius: 10px; transition: width 0.5s ease; }
        .xp-badges { display: flex; gap: 0.5rem; }
        .xp-badge { font-size: 1.2rem; opacity: 0.3; transition: all 0.3s; cursor: default; }
        .xp-badge.unlocked { opacity: 1; animation: bounce 1s ease; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .theme-selector { position: relative; }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 50px; cursor: pointer; font-size: 1.2rem; transition: all 0.3s; }
        .theme-toggle:hover { border-color: var(--primary); background: var(--primaryLight); }
        .theme-menu { position: absolute; top: 120%; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1rem; min-width: 340px; max-height: 420px; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity 0.3s; box-shadow: 0 12px 32px rgba(0,0,0,0.1); z-index: 200; }
        .theme-menu.active { opacity: 1; pointer-events: all; }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .theme-option {
            display: flex; flex-direction: column; align-items: center; gap: 0.3rem; padding: 0.6rem 0.4rem;
            border: 2px solid transparent; border-radius: 12px; background: transparent; cursor: pointer;
            font-size: 0.65rem; font-weight: 600; color: var(--text); transition: all 0.3s;
        }
        .theme-option:hover { border-color: var(--primary); background: var(--primaryLight); }
        .theme-option.active { border-color: var(--primary); background: var(--primaryLight); }
        .theme-colors { display: flex; gap: 0.15rem; }
        .theme-color-swatch { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) {
            .timer-circle { width: 220px; height: 220px; }
            .timer-display { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="index.html" class="logo">📚 CalculEtudiant</a>
        <div style="display:flex;gap:1rem;align-items:center">
            <a href="mes-sauvegardes.html" style="background:var(--gradient);color:#FFF;padding:0.5rem 1.2rem;border-radius:50px;text-decoration:none;font-weight:600;font-size:0.85rem">💾 Sauvegardes</a>
            <div class="theme-selector">
                <button class="theme-toggle" id="themeToggle">🎨</button>
                <div class="theme-menu" id="themeMenu"><div class="theme-grid" id="themeGrid"></div></div>
            </div>
            <a href="index.html" class="back-link">← Retour</a>
        </div>
    </nav>
</header>

<!-- Barre XP -->
<div class="xp-bar-container">
    <span class="xp-label">🏆 Niveau</span>
    <span class="xp-level" id="xp-level">🌟 Débutant</span>
    <div class="xp-progress"><div class="xp-progress-fill" id="xp-fill" style="width:0%"></div></div>
    <span class="xp-label" id="xp-text">0 / 100 XP</span>
    <span class="xp-label" id="xp-streak">🔥 0</span>
    <div class="xp-badges">
        <span class="xp-badge" id="badge-fiches" title="50 fiches créées">📝</span>
        <span class="xp-badge" id="badge-quiz" title="20 quiz complétés">🧠</span>
        <span class="xp-badge" id="badge-pomodoro" title="50 sessions Pomodoro">🍅</span>
        <span class="xp-badge" id="badge-objectifs" title="30 objectifs atteints">🎯</span>
        <span class="xp-badge" id="badge-streak" title="7 jours de streak">🔥</span>
    </div>
</div>

<div class="pomodoro-container">
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="focus" onclick="switchMode('focus')">🍅 Focus (25min)</button>
        <button class="mode-btn" data-mode="break" onclick="switchMode('break')">☕ Pause (5min)</button>
        <button class="mode-btn" data-mode="long-break" onclick="switchMode('long-break')">🌿 Longue pause (15min)</button>
    </div>

    <div class="task-input-wrapper">
        <input type="text" class="task-input" id="task-input" placeholder="🎯 Sur quoi travailles-tu ?">
    </div>

    <div class="timer-wrapper">
        <div class="timer-circle">
            <svg class="timer-svg" viewBox="0 0 100 100">
                <circle class="timer-bg-circle" cx="50" cy="50" r="44"/>
                <circle class="timer-progress-circle" id="progress-circle" cx="50" cy="50" r="44" stroke-dasharray="276.46" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-inner">
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="timer-label" id="timer-label">Focus</div>
                <div class="session-counter">🍅 Session <span id="session-count">1</span>/4</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-control btn-start" id="btn-toggle" onclick="toggleTimer()">▶️ Démarrer</button>
        <button class="btn-control" onclick="resetTimer()">🔄 Reset</button>
        <button class="btn-control" onclick="skipSession()">⏭️ Skip</button>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-value" id="stat-sessions">0</div><div class="stat-label">Sessions aujourd'hui</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-focus-time">0min</div><div class="stat-label">Temps focus</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-streak">0</div><div class="stat-label">Jours de streak</div></div>
    </div>

    <div class="ai-suggestion" id="ai-suggestion">
        <h3>🤖 Conseil IA</h3>
        <p id="ai-text"></p>
    </div>
</div>

<script>
    const GEMINI_KEY = (() => { const k = 'QUl6YVN5REN5a0gyOEt' + 'sNDBQdWhGZU44RXhPTldj' + 'S3FEQVNIZkVn'; return atob(k); })();
    const modes = { focus: 25*60, break: 5*60, 'long-break': 15*60 };
    let currentMode = 'focus';
    let timeLeft = modes.focus;
    let totalTime = modes.focus;
    let timerInterval = null;
    let isRunning = false;
    let sessionsCompleted = 0;
    let streak = parseInt(localStorage.getItem('pomodoro-streak') || '0');

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function updateDisplay() {
        document.getElementById('timer-display').textContent = formatTime(timeLeft);
        const circle = document.getElementById('progress-circle');
        const circumference = 276.46;
        const offset = circumference * (1 - timeLeft / totalTime);
        circle.style.strokeDashoffset = offset;
        let color = '#FF6B35';
        if (currentMode === 'focus') color = 'var(--primary)';
        else if (currentMode === 'break') color = '#10B981';
        else if (currentMode === 'long-break') color = '#8B5CF6';
        circle.style.stroke = color;
    }

    function switchMode(mode) {
        if (isRunning) {
            if (confirm('Changer de mode va réinitialiser le timer. Continuer ?')) {
                pauseTimer();
                currentMode = mode;
                timeLeft = modes[mode];
                totalTime = modes[mode];
                document.getElementById('timer-label').textContent = mode === 'focus' ? 'Focus' : mode === 'break' ? 'Pause' : 'Longue pause';
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
                updateDisplay();
                document.getElementById('btn-toggle').textContent = '▶️ Démarrer';
                document.getElementById('btn-toggle').classList.remove('paused');
            }
        } else {
            currentMode = mode;
            timeLeft = modes[mode];
            totalTime = modes[mode];
            document.getElementById('timer-label').textContent = mode === 'focus' ? 'Focus' : mode === 'break' ? 'Pause' : 'Longue pause';
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            updateDisplay();
        }
    }

    function toggleTimer() {
        if (isRunning) pauseTimer();
        else startTimer();
    }

    function startTimer() {
        isRunning = true;
        const btn = document.getElementById('btn-toggle');
        btn.textContent = '⏸️ Pause';
        btn.classList.add('paused');
        timerInterval = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                completeSession();
            }
        }, 1000);
    }

    function pauseTimer() {
        isRunning = false;
        const btn = document.getElementById('btn-toggle');
        btn.textContent = '▶️ Reprendre';
        btn.classList.remove('paused');
        clearInterval(timerInterval);
    }

    function resetTimer() {
        pauseTimer();
        timeLeft = modes[currentMode];
        totalTime = modes[currentMode];
        updateDisplay();
        document.getElementById('btn-toggle').textContent = '▶️ Démarrer';
        document.getElementById('btn-toggle').classList.remove('paused');
    }

    function skipSession() {
        pauseTimer();
        completeSession();
    }

    function completeSession() {
        if (currentMode === 'focus') {
            sessionsCompleted++;
            document.getElementById('session-count').textContent = sessionsCompleted + 1;
            const sessionsToday = parseInt(document.getElementById('stat-sessions').textContent) + 1;
            document.getElementById('stat-sessions').textContent = sessionsToday;
            const focusMin = parseInt(document.getElementById('stat-focus-time').textContent || 0) + 25;
            document.getElementById('stat-focus-time').textContent = focusMin + 'min';
            const today = new Date().toDateString();
            const lastPomodoro = localStorage.getItem('pomodoro-last-date');
            if (lastPomodoro !== today) {
                streak++;
                localStorage.setItem('pomodoro-streak', streak);
                localStorage.setItem('pomodoro-last-date', today);
            }
            document.getElementById('stat-streak').textContent = streak;
            if (typeof addXP !== 'undefined') addXP(10, 'pomodoro-session');
            if (typeof XPSystem !== 'undefined') XPSystem.incrementCounter('pomodoro-count');
            if (sessionsCompleted % 4 === 0) {
                getAISuggestion();
                switchMode('long-break');
            } else {
                switchMode('break');
            }
        } else {
            switchMode('focus');
            document.getElementById('session-count').textContent = sessionsCompleted + 1;
        }
        updateDisplay();
        document.getElementById('btn-toggle').textContent = '▶️ Démarrer';
        document.getElementById('btn-toggle').classList.remove('paused');
        isRunning = false;
    }

    async function getAISuggestion() {
        const task = document.getElementById('task-input').value || 'mes études';
        const sessionsToday = parseInt(document.getElementById('stat-sessions').textContent) || 0;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Tu es un coach de productivité. L'utilisateur a fait ${sessionsToday} sessions Pomodoro aujourd'hui sur "${task}". Donne UN conseil court et motivant (2-3 phrases max).` }] }] })
            });
            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Continue comme ça, tu progresses bien ! 🚀";
            document.getElementById('ai-text').textContent = text;
            document.getElementById('ai-suggestion').classList.add('show');
        } catch(e) {
            document.getElementById('ai-text').textContent = "🌟 Super productivité ! Pense à t'étirer et boire de l'eau. Tu gères !";
            document.getElementById('ai-suggestion').classList.add('show');
        }
    }

    // Sauvegarde des stats du jour
    const todayStats = JSON.parse(localStorage.getItem('pomodoro-today') || '{"date":"","sessions":0,"minutes":0}');
    const today = new Date().toDateString();
    if (todayStats.date === today) {
        document.getElementById('stat-sessions').textContent = todayStats.sessions;
        document.getElementById('stat-focus-time').textContent = todayStats.minutes + 'min';
    } else {
        localStorage.setItem('pomodoro-today', JSON.stringify({ date: today, sessions: 0, minutes: 0 }));
    }
    document.getElementById('stat-streak').textContent = streak;
    updateDisplay();

    // Sauvegarde périodique des stats
    setInterval(() => {
        const sessions = parseInt(document.getElementById('stat-sessions').textContent);
        const minutes = parseInt(document.getElementById('stat-focus-time').textContent);
        localStorage.setItem('pomodoro-today', JSON.stringify({ date: new Date().toDateString(), sessions, minutes }));
    }, 30000);
</script>
