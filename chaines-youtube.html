        body { background: linear-gradient(135deg, #F7F7FA 0%, #FFF5F0 50%, #F7F7FA 100%); font-family: 'DM Sans', sans-serif; color: var(--text); line-height: 1.6; min-height: 100vh; }
        header { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        nav { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #FF6B35, #FF8C42); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .back-link { color: var(--text-light); text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: color 0.3s; }
        .back-link:hover { color: var(--primary); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .page-header { text-align: center; margin-bottom: 2rem; }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px; color: #0F0F1A; margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-light); font-size: 1rem; }

        /* Barre XP */
        .xp-bar-container {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 0.5rem 2rem; display: flex; align-items: center; gap: 1rem;
            font-size: 0.8rem; max-width: 1280px; margin: 0 auto; flex-wrap: wrap;
        }
        .xp-label { font-weight: 700; color: var(--primary); white-space: nowrap; }
        .xp-level { font-weight: 700; color: var(--text); white-space: nowrap; }
        .xp-progress { flex: 1; height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; min-width: 100px; }
        .xp-progress-fill { height: 100%; background: linear-gradient(90deg, #FFD23F, var(--primary)); border-radius: 10px; transition: width 0.5s ease; }
        .xp-badges { display: flex; gap: 0.5rem; }
        .xp-badge { font-size: 1.2rem; opacity: 0.3; transition: all 0.3s; cursor: default; }
        .xp-badge.unlocked { opacity: 1; animation: bounce 1s ease; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* Sélecteur de thème */
        .theme-selector { position: relative; }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 50px; cursor: pointer; font-size: 1.2rem; transition: all 0.3s; }
        .theme-toggle:hover { border-color: var(--primary); background: var(--primary-light); }
        .theme-menu { position: absolute; top: 120%; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1rem; min-width: 340px; max-height: 420px; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity 0.3s; box-shadow: 0 12px 32px rgba(0,0,0,0.1); z-index: 200; }
        .theme-menu.active { opacity: 1; pointer-events: all; }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .theme-option {
            display: flex; flex-direction: column; align-items: center; gap: 0.3rem; padding: 0.6rem 0.4rem;
            border: 2px solid transparent; border-radius: 12px; background: transparent; cursor: pointer;
            font-size: 0.65rem; font-weight: 600; color: var(--text); transition: all 0.3s;
        }
        .theme-option:hover { border-color: var(--primary); background: var(--primary-light); }
        .theme-option.active { border-color: var(--primary); background: var(--primary-light); }
        .theme-colors { display: flex; gap: 0.15rem; }
        .theme-color-swatch { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }

        /* Filtres filières */
        .filieres-filter {
            display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 2rem;
        }
        .filiere-btn {
            background: var(--bg); border: 2px solid var(--border); padding: 0.6rem 1.2rem;
            border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: all var(--transition); white-space: nowrap;
        }
        .filiere-btn:hover, .filiere-btn.active {
            border-color: var(--primary); background: var(--primary-light); color: var(--primary);
        }

        /* Grille chaînes */
        .chaines-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;
        }
        .chaine-card {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.5rem; transition: all var(--transition); display: flex; gap: 1rem;
            align-items: flex-start; cursor: pointer;
        }
        .chaine-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--primary); }
        .chaine-avatar {
            width: 60px; height: 60px; border-radius: 50%; background: var(--bg);
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            flex-shrink: 0; border: 2px solid var(--border);
        }
        .chaine-info { flex: 1; }
        .chaine-name { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
        .chaine-matiere { font-size: 0.8rem; color: var(--primary); font-weight: 600; margin-bottom: 0.5rem; }
        .chaine-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.5; margin-bottom: 0.8rem; }
        .chaine-link {
            display: inline-block; padding: 0.4rem 1rem; background: var(--primary-light); color: var(--primary);
            border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 0.8rem; transition: all 0.3s;
        }
        .chaine-link:hover { background: var(--primary); color: #FFF; }

        .no-results { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 1.2rem; }

        @media (max-width: 768px) {
            .filieres-filter { gap: 0.4rem; }
            .filiere-btn { padding: 0.5rem 0.9rem; font-size: 0.75rem; }
            .chaines-grid { grid-template-columns: 1fr; }

</head>

    function renderFilters() {
        let html = `<button class="filiere-btn active" data-filiere="all" onclick="filterFilieres('all', this)">🔥 Toutes</button>`;
        filieresData.forEach(f => {
            html += `<button class="filiere-btn" data-filiere="${f.nom}" onclick="filterFilieres('${f.nom}', this)">${f.icon} ${f.nom}</button>`;
        });
        filterContainer.innerHTML = html;
    }

    function filterFilieres(filiere, btn) {
        currentFiliere = filiere;
        document.querySelectorAll('.filiere-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderChaines();
        if (typeof addXP !== 'undefined') addXP(5, 'use-calculator');
    }

    function renderChaines() {
        const grid = document.getElementById('chaines-grid');
        const noResults = document.getElementById('no-results');
        let chaines = [];
        if (currentFiliere === 'all') {
            chaines = filieresData.flatMap(f => f.chaines.map(c => ({...c, filiere: f.nom, filiereIcon: f.icon})));
        } else {
            const filiere = filieresData.find(f => f.nom === currentFiliere);
            if (filiere) chaines = filiere.chaines.map(c => ({...c, filiere: filiere.nom, filiereIcon: filiere.icon}));
        }

        if (chaines.length === 0) {
            grid.innerHTML = '';
            noResults.style.display = 'block';
            return;
        }
        noResults.style.display = 'none';

        grid.innerHTML = chaines.map(c => `
            <div class="chaine-card">
                <div class="chaine-avatar">${c.avatar}</div>
                <div class="chaine-info">
                    <div class="chaine-name">${c.nom}</div>
                    <div class="chaine-matiere">${c.filiereIcon} ${c.filiere} · ${c.matiere}</div>

                    <a href="${c.lien}" target="_blank" class="chaine-link">📺 Voir la chaîne</a>
                </div>
            </div>
        `).join('');
    }

    renderFilters();
    renderChaines();
